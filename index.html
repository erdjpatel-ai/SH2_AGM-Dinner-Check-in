<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AGM 2026 — Gate Check-In</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #2a1438; color: #fff; min-height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: linear-gradient(90deg, #ab185c, #4a1c5c);
    padding: 14px 16px; text-align: center; border-bottom: 3px solid #f5c646;
  }
  header h1 { font-size: 17px; letter-spacing: .5px; }
  header p { font-size: 12px; color: #f5c646; margin-top: 2px; }

  #scanWrap { position: relative; width: 100%; background: #000; }
  #video { width: 100%; display: block; }
  #frame {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 62%; aspect-ratio: 1; border: 3px solid rgba(245,198,70,.9);
    border-radius: 18px; box-shadow: 0 0 0 2000px rgba(0,0,0,.35);
  }

  #result {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 24px 18px;
    transition: background .15s;
  }
  #result.idle   { background: #2a1438; }
  #result.valid  { background: #146b3a; }
  #result.used   { background: #b0182d; }
  #result.bad    { background: #7a5a14; }
  #icon { font-size: 64px; line-height: 1; }
  #status { font-size: 30px; font-weight: 800; margin: 10px 0 6px; }
  #detail { font-size: 17px; opacity: .95; line-height: 1.45; }
  #hint { font-size: 13px; opacity: .7; margin-top: 14px; }

  .bar { display: flex; gap: 8px; padding: 12px; background: #1d0e28; }
  .bar button {
    flex: 1; padding: 13px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; color: #fff; background: #4a1c5c;
  }
  .bar button.warn { background: #8a2a2a; }
  #count {
    text-align: center; padding: 8px; font-size: 13px;
    background: #1d0e28; color: #f5c646; border-top: 1px solid #3a2148;
  }
</style>
</head>
<body>
  <header>
    <h1>SILVER HARMONY 2 — AGM 2026</h1>
    <p>Dinner Gate Check-In · 21 June</p>
  </header>

  <div id="scanWrap">
    <video id="video" playsinline></video>
    <div id="frame"></div>
  </div>

  <div id="result" class="idle">
    <div id="icon">📷</div>
    <div id="status">Ready to scan</div>
    <div id="detail">Point the camera at a pass QR code</div>
    <div id="hint">Hold steady · good light helps</div>
  </div>

  <div id="count">Checked in: <span id="num">0</span></div>

  <div class="bar">
    <button onclick="manualEntry()">Enter ID manually</button>
    <button onclick="exportList()">Export list</button>
    <button class="warn" onclick="resetEvent()">Reset event</button>
  </div>

<script>
const KEY = "agm2026_checkin";
const video = document.getElementById("video");
const result = document.getElementById("result");
const icon = document.getElementById("icon");
const statusEl = document.getElementById("status");
const detail = document.getElementById("detail");
const numEl = document.getElementById("num");

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d", { willReadFrequently: true });
let lastCode = null, lastTime = 0, busy = false;

// ---- local store of used passes ----
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function updateCount() { numEl.textContent = Object.keys(load()).length; }

// QR payload format: "SH2-0001|B-204|Dilip Patel|..."  -> we key on the Pass ID (first field)
function parseId(text) {
  const id = (text.split("|")[0] || text).trim().toUpperCase();
  return id;
}
function parseName(text) {
  const parts = text.split("|");
  return parts.length > 2 ? `${parts[1]} · ${parts[2]}` : "";
}

function show(kind, ic, st, dt) {
  result.className = kind;
  icon.textContent = ic;
  statusEl.textContent = st;
  detail.innerHTML = dt;
  if (navigator.vibrate) navigator.vibrate(kind === "valid" ? 120 : [80,60,80]);
}

function handle(text) {
  const id = parseId(text);
  if (!id) return;
  const store = load();
  const now = new Date();
  const tStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  if (store[id]) {
    show("used", "✗", "ALREADY USED",
      `<b>${id}</b><br>${parseName(text) || ""}<br><span style="font-size:14px">First scanned at ${store[id].time}</span>`);
  } else {
    store[id] = { time: tStr, name: parseName(text) };
    save(store);
    updateCount();
    show("valid", "✓", "CHECKED IN",
      `<b>${id}</b><br>${parseName(text) || ""}<br><span style="font-size:14px">${tStr}</span>`);
  }
  setTimeout(() => {
    if (!busy) show("idle", "📷", "Ready to scan", "Point the camera at a pass QR code");
  }, 2600);
}

function manualEntry() {
  const v = prompt("Enter Pass ID (e.g. SH2-0001):");
  if (v) handle(v.trim());
}

function resetEvent() {
  if (confirm("Clear ALL check-ins for the event? This cannot be undone.")) {
    localStorage.removeItem(KEY);
    updateCount();
    show("idle", "📷", "Ready to scan", "List cleared");
  }
}

function exportList() {
  const store = load();
  const ids = Object.keys(store);
  if (ids.length === 0) { alert("No check-ins yet."); return; }
  let csv = "Pass ID,Name/Flat,Checked-in Time\n";
  ids.sort().forEach(id => {
    const r = store[id];
    const nm = (r.name || "").replace(/"/g, '""');
    csv += `"${id}","${nm}","${r.time || ""}"\n`;
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "AGM2026_checkins.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---- camera + scan loop ----
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }, audio: false
    });
    video.srcObject = stream;
    await video.play();
    requestAnimationFrame(scan);
  } catch (e) {
    show("bad", "⚠️", "Camera blocked",
      "Allow camera access in your browser, then reload this page.");
  }
}

function scan() {
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
    if (code && code.data) {
      const t = Date.now();
      // debounce: ignore same code re-read within 3s
      if (code.data !== lastCode || t - lastTime > 3000) {
        lastCode = code.data; lastTime = t;
        busy = true;
        handle(code.data);
        setTimeout(() => { busy = false; }, 2600);
      }
    }
  }
  requestAnimationFrame(scan);
}

updateCount();
startCamera();
</script>
</body>
</html>
